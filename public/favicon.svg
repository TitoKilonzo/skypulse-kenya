<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <rect width="64" height="64" rx="14" fill="#0c2a3e"/>

  <!-- Sun rays -->
  <circle cx="26" cy="24" r="7" fill="#38bdf8" opacity="0.95"/>
  <!-- Ray lines -->
  <line x1="26" y1="13" x2="26" y2="10" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26" y1="35" x2="26" y2="38" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="15" y1="24" x2="12" y2="24" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="37" y1="24" x2="40" y2="24" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="18.5" y1="16.5" x2="16.4" y2="14.4" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="33.5" y1="31.5" x2="35.6" y2="33.6" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="33.5" y1="16.5" x2="35.6" y2="14.4" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="18.5" y1="31.5" x2="16.4" y2="33.6" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cloud body -->
  <rect x="14" y="34" width="36" height="16" rx="8" fill="#e0f2fe"/>
  <!-- Cloud bumps -->
  <circle cx="24" cy="34" r="8" fill="#e0f2fe"/>
  <circle cx="34" cy="31" r="10" fill="#e0f2fe"/>
  <circle cx="44" cy="34" r="7" fill="#e0f2fe"/>

  <!-- Cloud inner shadow / depth -->
  <rect x="14" y="40" width="36" height="10" rx="0" fill="#bae6fd" opacity="0.4"/>
</svg>
